networks:
  supabase:
    driver: bridge

services:
  db:
    image: 'supabase/postgres:15.1.0.155'
    restart: unless-stopped
    container_name: supabase-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - db_data:/var/lib/postgresql/data:Z
    ports:
      - "54322:5432"
    networks:
      - supabase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres 
      -c config_file=/etc/postgresql/postgresql.conf
      -c log_min_messages=fatal

  rest:
    image: 'postgrest/postgrest:v11.2.0'
    restart: unless-stopped
    container_name: supabase-rest
    environment:
      PGRST_DB_URI: 'postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}'
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
    ports:
      - "54321:3000"
    networks:
      - supabase
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: >
      sh -c "
      echo 'Waiting for database to be ready...';
      until nc -z db 5432; do
        echo 'Waiting for database connection...';
        sleep 2;
      done;
      echo 'Database accessible!';
      sleep 5;
      echo 'Starting PostgREST...';
      exec postgrest"

  realtime:
    image: 'supabase/realtime:v2.30.34'
    restart: unless-stopped
    container_name: supabase-realtime
    environment:
      APP_NAME: realtime
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      PORT: 4000
      API_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      JWT_SECRET: ${GOTRUE_JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
      SECURE_CHANNELS: "true"
      SLOT_NAME: supabase_realtime_rls
      TEMPORARY_SLOT: "true"
      RLIMIT_NOFILE: 65536
      ERL_AFLAGS: "-proto_dist inet_tcp"
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    ports:
      - "54324:4000"
    networks:
      - supabase
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: >
      sh -c "
      echo 'Waiting for database to be ready...';
      until pg_isready -h db -p 5432 -U ${POSTGRES_USER}; do
        sleep 2;
      done;
      echo 'Database ready!';
      echo 'Creating schemas if they do not exist...';
      PGPASSWORD=${POSTGRES_PASSWORD} psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'CREATE SCHEMA IF NOT EXISTS _realtime;' || true;
      PGPASSWORD=${POSTGRES_PASSWORD} psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'CREATE SCHEMA IF NOT EXISTS realtime;' || true;
      PGPASSWORD=${POSTGRES_PASSWORD} psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'GRANT USAGE ON SCHEMA _realtime TO ${POSTGRES_USER};' || true;
      PGPASSWORD=${POSTGRES_PASSWORD} psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'GRANT ALL ON SCHEMA _realtime TO ${POSTGRES_USER};' || true;
      echo 'Schemas created, running migrations...';
      /app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"

  auth:
    image: 'supabase/gotrue:v2.150.0'
    restart: unless-stopped
    container_name: supabase-auth
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: 'postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?search_path=auth'
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL}
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DISABLE_SIGNUP: 'false'
      GOTRUE_MAILER_AUTOCONFIRM: 'true'
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'true'
      GOTRUE_SMTP_HOST: ''
      GOTRUE_SMTP_PORT: 587
      GOTRUE_SMTP_USER: ''
      GOTRUE_SMTP_PASS: ''
      GOTRUE_PASSWORD_MIN_LENGTH: 6
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: 'true'
    ports:
      - "54325:9999"
    networks:
      - supabase
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: >
      sh -c "
      echo 'Waiting for database to be ready...';
      until nc -z db 5432; do
        echo 'Waiting for database connection...';
        sleep 2;
      done;
      echo 'Database accessible!';
      sleep 5;
      echo 'Starting GoTrue...';
      /usr/local/bin/gotrue"

  studio:
    image: 'supabase/studio:latest'
    restart: unless-stopped
    container_name: supabase-studio
    environment:
      SUPABASE_URL: 'http://rest:3000'
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_REST_URL: 'http://rest:3000'
      SUPABASE_AUTH_URL: 'http://auth:9999'
      SUPABASE_REALTIME_URL: 'http://realtime:4000'
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      STUDIO_PORT: 3000
      DEFAULT_ORGANIZATION_NAME: ${PROJECT_REF:-devreadysetllc}
      DEFAULT_PROJECT_NAME: ${PROJECT_REF:-devreadysetllc}
    ports:
      - "54323:3000"
    networks:
      - supabase
    depends_on:
      - db
      - rest
      - auth
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: 'redis:7-alpine'
    restart: unless-stopped
    container_name: supabase-redis
    ports:
      - "6379:6379"
    networks:
      - supabase
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local